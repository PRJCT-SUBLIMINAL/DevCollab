<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevCollab API Tester</title>

<style>
  body {
    font-family: system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    margin: 0;
    padding: 2rem;
  }

  h1 {
    text-align: center;
    color: #a78bfa;
  }

  .base {
    display: flex;
    justify-content: center;
    margin-bottom: 2rem;
  }

  input {
    width: 400px;
    padding: 10px;
    background: #1e2130;
    border: 1px solid #2d3148;
    color: white;
    border-radius: 6px;
    font-family: monospace;
  }

  .card {
    background: #1e2130;
    border: 1px solid #2d3148;
    border-radius: 10px;
    margin: 1rem auto;
    max-width: 600px;
    padding: 1rem;
  }

  .title {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1rem;
    font-weight: bold;
  }

  .method {
    color: #6ee7b7;
    font-family: monospace;
  }

  input.field {
    width: 100%;
    margin: 5px 0;
  }

  button {
    margin-top: 10px;
    padding: 8px 12px;
    background: #7c3aed;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
  }

  pre {
    background: #0f1117;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    overflow-x: auto;
  }
</style>
</head>

<body>

<h1>⚡ DevCollab API Tester</h1>

<div class="base">
  <input id="baseUrl" value="http://localhost:8080" />
</div>

<div id="app"></div>

<script>
const API = [
  {
    method: "POST",
    path: "/auth/register",
    title: "Register User",
    fields: [
      { key: "email", type: "text", placeholder: "email" },
      { key: "password", type: "password", placeholder: "password" }
    ]
  },
  {
    method: "POST",
    path: "/auth/login",
    title: "Login User",
    fields: [
      { key: "email", type: "text", placeholder: "email" },
      { key: "password", type: "password", placeholder: "password" }
    ]
  }
];

function getBase() {
  return document.getElementById("baseUrl").value;
}

function render() {
  const app = document.getElementById("app");

  API.forEach(route => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">
        <span>${route.title}</span>
        <span class="method">${route.method} ${route.path}</span>
      </div>

      ${route.fields.map(f => `
        <input class="field" placeholder="${f.placeholder}" data-key="${f.key}" type="${f.type}" />
      `).join("")}

      <button>Send</button>
      <pre style="display:none"></pre>
    `;

    const btn = div.querySelector("button");
    const pre = div.querySelector("pre");

    btn.onclick = async () => {
      const inputs = div.querySelectorAll("input");
      const body = {};

      inputs.forEach(i => {
        if (i.value) body[i.dataset.key] = i.value;
      });

      try {
        const res = await fetch(getBase() + route.path, {
          method: route.method,
          headers: { "Content-Type": "application/json" },
          body: route.method !== "GET" ? JSON.stringify(body) : undefined
        });

        const text = await res.text();

        pre.style.display = "block";
        pre.textContent = text;

      } catch (err) {
        pre.style.display = "block";
        pre.textContent = "Error: " + err;
      }
    };

    app.appendChild(div);
  });
}

render();
</script>

</body>
</html>
