<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevCollab API Tester</title>

<style>
  body {
    font-family: system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    margin: 0;
    padding: 2rem;
  }

  h1 {
    text-align: center;
    color: #a78bfa;
  }

  .base {
    display: flex;
    justify-content: center;
    margin-bottom: 1rem;
  }

  .authBar {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .token {
    font-size: 12px;
    opacity: 0.8;
    word-break: break-all;
  }

  input {
    width: 400px;
    padding: 10px;
    background: #1e2130;
    border: 1px solid #2d3148;
    color: white;
    border-radius: 6px;
    font-family: monospace;
  }

  .card {
    background: #1e2130;
    border: 1px solid #2d3148;
    border-radius: 10px;
    margin: 1rem auto;
    max-width: 600px;
    padding: 1rem;
  }

  .title {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1rem;
    font-weight: bold;
  }

  .method {
    color: #6ee7b7;
    font-family: monospace;
  }

  input.field {
    width: 100%;
    margin: 5px 0;
  }

  button {
    margin-top: 10px;
    margin-right: 5px;
    padding: 8px 12px;
    background: #7c3aed;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
  }

  .danger {
    background: #ef4444;
  }

  pre {
    background: #0f1117;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    overflow-x: auto;
  }
</style>
</head>

<body>

<h1>⚡ DevCollab API Tester</h1>

<div class="base">
  <input id="baseUrl" value="http://localhost:8080" />
</div>

<div class="authBar">
  <div class="token" id="tokenDisplay">No token</div>
  <button class="danger" onclick="logout()">Logout</button>
</div>

<div id="app"></div>

<script>
let authToken = null;

const API = [
  {
    method: "POST",
    path: "/auth/register",
    title: "Register User",
    fields: [
      { key: "email", type: "text", placeholder: "email" },
      { key: "password", type: "text", placeholder: "password" }
    ]
  },
  {
    method: "POST",
    path: "/auth/login",
    title: "Login User",
    fields: [
      { key: "email", type: "text", placeholder: "email" },
      { key: "password", type: "text", placeholder: "password" }
    ]
  },
  {
    method: "POST",
    path: "/profile/create",
    title: "Create Dev Profile",
    fields: [
      { key: "userId", type: "text", placeholder: "userId (from login response)" },
      { key: "username", type: "text", placeholder: "username" },
      { key: "bio", type: "text", placeholder: "bio" },
      { key: "skills", type: "text", placeholder: "skills (comma-separated, e.g. JavaScript, Python)", transform: "array" }
    ]
  },
  {
    method: "POST",
    path: "/profile/get",
    title: "Get Dev Profile",
    fields: [
      { key: "userId", type: "text", placeholder: "userId" }
    ]
  }
];

function getBase() {
  return document.getElementById("baseUrl").value;
}

function setToken(token, refreshToken) {
  authToken = token;
  if (!token) {
    document.getElementById("tokenDisplay").textContent = "No token";
    return;
  }
  const display = ["JWT: " + token.slice(0, 40) + "..."];
  if (refreshToken) display.push("Refresh: " + refreshToken.slice(0, 20) + "...");
  document.getElementById("tokenDisplay").textContent = display.join(" | ");
}

function logout() {
  setToken(null);
}

function render() {
  const app = document.getElementById("app");

  API.forEach(route => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">
        <span>${route.title}</span>
        <span class="method">${route.method} ${route.path}</span>
      </div>

      ${route.fields.map(f => `
        <input class="field" placeholder="${f.placeholder}" data-key="${f.key}" type="${f.type}" ${f.transform ? `data-transform="${f.transform}"` : ""} />
      `).join("")}

      <button>Send</button>
      <pre style="display:none"></pre>
    `;

    const btn = div.querySelector("button");
    const pre = div.querySelector("pre");

    btn.onclick = async () => {
      const inputs = div.querySelectorAll("input");
      const body = {};

      inputs.forEach(i => {
        if (i.value) {
          if (i.dataset.transform === "array") {
            body[i.dataset.key] = i.value.split(",").map(s => s.trim()).filter(Boolean);
          } else {
            body[i.dataset.key] = i.value;
          }
        }
      });

      const headers = {
        "Content-Type": "application/json"
      };

      if (authToken) {
        headers["Authorization"] = "Bearer " + authToken;
      }

      try {
        const res = await fetch(getBase() + route.path, {
          method: route.method,
          headers,
          body: route.method !== "GET" ? JSON.stringify(body) : undefined
        });

        const text = await res.text();

        pre.style.display = "block";
        pre.textContent = text;

        try {
          const json = JSON.parse(text);

          if (json.token) {
            setToken(json.token, json.refreshToken);
          }

          // Auto-fill userId only from user responses (register/login), not profile responses
          if (json.id && json.email) {
            const userIdInputs = document.querySelectorAll("input[data-key='userId']");
            userIdInputs.forEach(el => { el.value = json.id; });
          }
        } catch {}

      } catch (err) {
        pre.style.display = "block";
        pre.textContent = "Error: " + err;
      }
    };

    app.appendChild(div);
  });
}

render();
</script>

</body>
</html>
